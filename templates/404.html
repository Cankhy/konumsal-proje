<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sayfa Bulunamadı</title>
  <style>
    body{margin:0;display:grid;min-height:100vh;place-items:center;background:#f3f8fb;color:#0f172a;font-family:Arial,sans-serif}
    .card{max-width:520px;border:1px solid #d8e5ef;border-radius:24px;background:#fff;padding:32px;box-shadow:0 20px 50px rgba(15,23,42,.08);text-align:center}
    a{display:inline-flex;margin-top:18px;padding:12px 18px;border-radius:999px;background:#0f766e;color:#fff;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <div class="card">
    <h1>Aradığınız sayfa bulunamadı</h1>
    <p>Bağlantı değişmiş olabilir veya sayfa artık kullanılmıyor olabilir.</p>
    <a href="/">Ana sayfaya dön</a>
  </div>
</body>
</html>
