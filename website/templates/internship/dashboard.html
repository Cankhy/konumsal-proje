{% extends "website/base.html" %}

{% block content %}
<section class="max-w-5xl mx-auto px-4 py-10">
  <h1 class="text-2xl md:text-3xl font-bold mb-6">Yönetim Paneli</h1>

  <div class="grid md:grid-cols-4 gap-4">
    <div class="bg-white shadow rounded-xl p-4">
      <p class="text-xs text-slate-500 uppercase mb-1">Toplam Başvuru</p>
      <p class="text-2xl font-bold">{{ total_applications }}</p>
    </div>
    <div class="bg-white shadow rounded-xl p-4">
      <p class="text-xs text-slate-500 uppercase mb-1">İncelemede</p>
      <p class="text-2xl font-bold text-amber-500">{{ pending }}</p>
    </div>
    <div class="bg-white shadow rounded-xl p-4">
      <p class="text-xs text-slate-500 uppercase mb-1">Onaylanan</p>
      <p class="text-2xl font-bold text-emerald-600">{{ approved }}</p>
    </div>
    <div class="bg-white shadow rounded-xl p-4">
      <p class="text-xs text-slate-500 uppercase mb-1">Reddedilen</p>
      <p class="text-2xl font-bold text-red-500">{{ rejected }}</p>
    </div>
  </div>
</section>
{% endblock %}
