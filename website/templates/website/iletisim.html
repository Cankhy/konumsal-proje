{% extends 'website/base.html' %}
{% load static %}

{% block title %}İletişim | Konumsal{% endblock %}

{% block content %}

  <section class="relative h-[260px] md:h-[280px] flex items-center justify-center text-center">
  <div class="absolute inset-0">
    <img src="{% static 'images/headers/contact-header.jpg' %}"
         
         class="w-full h-full object-cover">
    <div class="absolute inset-0 bg-slate-900/70"></div>
  </div>

  <div class="relative z-10 max-w-3xl mx-auto px-4">
    <p class="text-xs md:text-sm tracking-[0.35em] text-teal-400 uppercase mb-3">
      
    </p>
    <h1 class="text-3xl md:text-4xl font-extrabold text-white drop-shadow-lg">
      İletişim
    </h1>
  </div>
</section>



<style>
  /* İletişim kartları genel alan */
  .contact-section {
    padding: 48px 0;
    background: #f8fafc; /* çok açık gri / mavi */
  }

  .contact-grid {
    display: grid;
    gap: 28px;
  }

  @media (min-width: 768px) {
    .contact-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
  }

  /* Tek kart */
  .contact-card {
    text-align: center;
    padding: 22px 18px 24px;
    border-radius: 22px;
    background: radial-gradient(circle at top, #ecfeff, #f9fafb);
    box-shadow: 0 16px 40px rgba(15, 23, 42, 0.06);
    transition: transform .25s ease, box-shadow .25s ease, background .25s ease;
  }

  .contact-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 55px rgba(15, 23, 42, 0.10);
    background: radial-gradient(circle at top, #e0faff, #f9fafb);
  }

  /* İkon çevresindeki halka */
  .contact-icon-wrap {
    width: 82px;
    height: 82px;
    margin: 0 auto;
    border-radius: 9999px;
    padding: 2px;
    background: linear-gradient(135deg, #06b6d4, #22c55e);
  }

  .contact-icon-inner {
    width: 100%;
    height: 100%;
    border-radius: inherit;
    background: #f9fefd;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .contact-icon-inner img {
    width: 38px;
    height: 38px;
    transition: transform .25s ease;
  }

  .contact-card:hover .contact-icon-inner img {
    transform: scale(1.08);
  }

  .contact-title {
    margin-top: 14px;
    font-size: 17px;
    font-weight: 700;
    color: #0f172a;
  }

  .contact-text {
    margin-top: 6px;
    font-size: 15px;
    color: #1f2933;
  }

  .contact-text a {
    color: #0e9fbb;
    text-decoration: none;
    font-weight: 500;
  }

  .contact-text a:hover {
    text-decoration: underline;
  }

  /* İletişim kutularındaki linkler */
.contact-link,
.contact-link:hover,
.contact-link:focus,
.contact-link:active {
  color: #0284c7;
  font-weight: 600;
  text-decoration: none !important;  /* çizgiyi zorla kapat */
  cursor: pointer;
  transition: color 0.2s ease;
}

/* Sadece hover rengi değişsin istiyorsan */
.contact-link:hover {
  color: #0f766e;
}


</style>

<section class="contact-section">
  <div class="max-w-6xl mx-auto px-4">
    <div class="contact-grid">

      <!-- Telefon -->
      <div class="contact-card">
        <div class="contact-icon-wrap">
          <div class="contact-icon-inner">
            <img src="{% static 'images/iletisim/phone.png' %}" alt="Telefon">
          </div>
        </div>
        <div class="contact-title">Telefon</div>
        <div class="contact-text">(0312) 266 39 39</div>
      </div>

      <!-- Fax -->
      <div class="contact-card">
        <div class="contact-icon-wrap">
          <div class="contact-icon-inner">
            <img src="{% static 'images/iletisim/fax.png' %}" alt="Fax">
          </div>
        </div>
        <div class="contact-title">Fax</div>
        <div class="contact-text">(0312) 266 39 41</div>
      </div>

      <!-- E-Posta -->
      <div class="contact-card">
        <div class="contact-icon-wrap">
          <div class="contact-icon-inner">
            <img src="{% static 'images/iletisim/mail.png' %}" alt="E-posta">
          </div>
        </div>
        <div class="contact-title">E-Posta</div>
        <div class="contact-text">
         <a href="mailto:bilgi@konumsal.com.tr" class="contact-link">
    bilgi@konumsal.com.tr
</a>

        </div>
      </div>

      <!-- Adres -->
      <div class="contact-card">
        <div class="contact-icon-wrap">
          <div class="contact-icon-inner">
            <img src="{% static 'images/iletisim/location.png' %}" alt="Adres">
          </div>
        </div>
        <div class="contact-title">Adres</div>
        <div class="contact-text">
          <a href="https://maps.app.goo.gl/menDRwzYb8ioeKJ18"
     target="_blank"
     rel="noopener"
     class="contact-link">
    Cyberpark Erge Binası Zemin Kat<br>
    No:19-31 Bilkent / ANKARA
  </a>
        </div>
      </div>

    </div>
  </div>
</section>



<!-- BURADAN SONRASI: HARİTA BÖLÜMÜ -->
<section class="w-full">
  <div style="width:100%; height:430px;">
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d3062.213131713551!2d32.7437636!3d39.869463599999996!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1str!2str!4v1763535774226!5m2!1str!2str"
      style="border:0; width:100%; height:100%;"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  </div>
</section>


{% endblock %}
