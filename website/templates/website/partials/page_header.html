{% load static %}

<section class="relative h-52 md:h-64 lg:h-72 overflow-hidden">
  <!-- Arka plan görseli -->
  <div class="absolute inset-0">
    <img src="{% static bg_image %}"
         alt="{{ title }}"
         class="w-full h-full object-cover">
    <div class="absolute inset-0 bg-slate-900/60"></div>
  </div>

  <!-- Metin alanı -->
  <div class="relative max-w-6xl mx-auto px-4 h-full flex flex-col items-center justify-center text-center">
    {% if subtitle %}
      <p class="text-xs tracking-[0.3em] uppercase text-teal-300 mb-2">
        {{ subtitle }}
      </p>
    {% endif %}
    <h1 class="text-3xl md:text-4xl lg:text-5xl font-extrabold text-white">
      {{ title }}
    </h1>
  </div>
</section>
