{% load static %}

<section class="w-full bg-white">
  <div class="max-w-6xl mx-auto px-4 pt-10 md:pt-14 pb-8 md:pb-10">

    <div class="grid gap-8 md:gap-10 md:grid-cols-2 items-center">

      <!-- SOL: Yazılar -->
      <div>
        <p class="text-xs font-semibold tracking-[0.35em] text-slate-500 uppercase">
          KONUMSAL BİLGİ SİSTEMLERİ
        </p>

        <h1 class="mt-3 text-4xl md:text-6xl font-extrabold tracking-tight text-sky-700">
          {{ title }}
        </h1>

        <p class="mt-3 text-lg md:text-2xl font-semibold text-slate-800">
          {{ subtitle }}
        </p>

        {% if desc %}
          <p class="mt-5 text-sm md:text-base leading-relaxed text-slate-600">
            {{ desc }}
          </p>
        {% endif %}

        {% if cta_url and cta_text %}
          <div class="mt-7">
            <a href="{{ cta_url }}"
               class="inline-flex items-center gap-2 rounded-full px-6 py-3
                      bg-sky-600 text-white text-sm font-semibold shadow-sm
                      hover:bg-sky-700 transition">
              {{ cta_text }}
              <span class="text-white/80">→</span>
            </a>
          </div>
        {% endif %}
      </div>

      <!-- SAĞ: Görsel -->
      <div class="relative">
        <div class="rounded-3xl overflow-hidden border border-slate-200 shadow-sm bg-slate-50">
          <img src="{{ image }}"
               alt="{{ title }}"
               class="w-full h-[220px] md:h-[320px] object-cover">
        </div>

        <!-- hafif dekor -->
        <div class="absolute -z-10 -inset-6 bg-sky-100/50 blur-2xl rounded-[40px]"></div>
      </div>

    </div>

  </div>

  <!-- ince ayırıcı -->
  <div class="h-px bg-slate-200"></div>
</section>
