{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş - Konumsal Bilgi Sistemleri</title>
  <link rel="stylesheet" href="{% static 'css/output.css' %}?v=20260506-ui-refresh4">
</head>
<body class="min-h-screen bg-slate-950">
  <main class="auth-cyber-page auth-choice-page" style="background-image: linear-gradient(120deg, rgba(2,12,23,0.76), rgba(0,91,136,0.28)), url('{% static "images/slider/slide-1-siber.jpg" %}');">
    <form method="post" class="auth-choice-card">
      {% csrf_token %}
      <a href="{% url 'website:home' %}" class="auth-logo-link" aria-label="Ana sayfaya dön">
        <img src="{% static 'images/konumsal-logo-white.png' %}" alt="Konumsal Bilgi Sistemleri" class="auth-panel-logo">
      </a>

      <div class="auth-role-tabs" data-selected="{{ selected_role|default:'intern' }}">
        <button type="button" class="auth-role-tab" data-role="staff">Personel</button>
        <button type="button" class="auth-role-tab" data-role="intern">Stajyer</button>
      </div>

      <input id="auth-role-input" type="hidden" name="role" value="{{ selected_role|default:'intern' }}">

      <h1 id="auth-title" class="mt-8 text-center text-3xl font-bold text-white">Stajyer Girişi</h1>
      <p id="auth-subtitle" class="mt-3 text-center text-sm leading-6 text-white/75">Hesabınla giriş yap, paneline güvenli şekilde geç ve günlük işlemlerini kaldığın yerden sürdür.</p>

      {% if error %}
        <div class="mt-6 rounded-2xl border border-rose-300/50 bg-rose-500/15 px-4 py-3 text-sm font-semibold text-rose-100">
          {{ error }}
        </div>
      {% endif %}

      <div class="mt-7 space-y-4">
        <div>
          <label for="auth-username" class="sr-only">Kullanıcı adı</label>
          <input id="auth-username" type="text" name="username" placeholder="Kullanıcı adı" class="auth-choice-input" required autofocus autocomplete="username">
        </div>
        <div>
          <label for="auth-password" class="sr-only">Şifre</label>
          <input id="auth-password" type="password" name="password" placeholder="Şifre" class="auth-choice-input" required autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="auth-choice-submit">Giriş Yap</button>
    </form>
  </main>

  <script>
    const roleInput = document.getElementById("auth-role-input");
    const title = document.getElementById("auth-title");
    const subtitle = document.getElementById("auth-subtitle");
    const tabs = Array.from(document.querySelectorAll(".auth-role-tab"));

    function setRole(role) {
      roleInput.value = role;
      const isStaff = role === "staff";
      title.textContent = isStaff ? "Personel Girişi" : "Stajyer Girişi";
      subtitle.textContent = isStaff
        ? "Başvuruları, günlük akışını ve stajyer iletişimini tek merkezden yönet."
        : "Günlüklerini yaz, belgelerini takip et ve personelinle aynı ekranda ilerle.";
      tabs.forEach((tab) => tab.classList.toggle("is-active", tab.dataset.role === role));
    }

    tabs.forEach((tab) => tab.addEventListener("click", () => setRole(tab.dataset.role)));
    setRole(roleInput.value || "intern");
  </script>
</body>
</html>
