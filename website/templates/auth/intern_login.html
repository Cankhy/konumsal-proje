{% extends "website/base.html" %}

{% block content %}
<section class="max-w-md mx-auto px-4 py-16">
  <h1 class="text-3xl font-bold text-center mb-6">Stajyer Girişi</h1>

  {% if form.errors %}
    <div class="mb-4 rounded-xl bg-red-50 text-red-700 text-sm px-4 py-3">
      TC / kullanıcı adı veya şifre hatalı. Lütfen tekrar deneyin.
    </div>
  {% endif %}

  <form method="post" class="space-y-4 bg-white/90 rounded-2xl shadow-md p-6">
    {% csrf_token %}

    <div>
      <label for="id_username"
             class="block text-sm font-medium text-slate-700 mb-1">
        Kullanıcı adı / TC
      </label>
      <input type="text" name="username" id="id_username" autofocus
             class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm
                    focus:outline-none focus:ring-2 focus:ring-emerald-500">
    </div>

    <div>
      <label for="id_password"
             class="block text-sm font-medium text-slate-700 mb-1">
        Şifre
      </label>
      <input type="password" name="password" id="id_password"
             class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm
                    focus:outline-none focus:ring-2 focus:ring-emerald-500">
    </div>

    <button type="submit"
            class="w-full mt-4 inline-flex justify-center items-center px-4 py-2
                   rounded-lg bg-emerald-500 text-white font-semibold
                   hover:bg-emerald-600">
      Giriş Yap
    </button>
  </form>
</section>
{% endblock %}
