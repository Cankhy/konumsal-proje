{% extends "website/base.html" %}
{% load static %}

{% block title %}Giriş | Konumsal{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center bg-slate-50 py-12">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">
    <h1 class="text-2xl font-bold text-slate-900 mb-6 text-center">
      Sisteme Giriş
    </h1>

    {% if form.errors %}
      <div class="mb-4 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3">
        Kullanıcı adı veya şifre hatalı. Lütfen tekrar deneyin.
      </div>
    {% endif %}

    <form method="post" action="{% url 'login' %}" class="space-y-4">
      {% csrf_token %}

      {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
      {% endif %}

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
          Kullanıcı adı
        </label>
        <input
          type="text"
          name="username"
          autofocus
          required
          class="w-full border border-slate-300 rounded-lg px-3 py-2
                 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500"
        >
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
          Şifre
        </label>
        <input
          type="password"
          name="password"
          required
          class="w-full border border-slate-300 rounded-lg px-3 py-2
                 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500"
        >
      </div>

      <button
        type="submit"
        class="w-full bg-sky-600 hover:bg-sky-700 text-white font-semibold
               py-2.5 rounded-lg transition"
      >
        Giriş Yap
      </button>
    </form>
  </div>
</div>
{% endblock %}
