{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yönetim Girişi - Konumsal Bilgi Sistemleri</title>
  <link rel="stylesheet" href="{% static 'css/output.css' %}?v=20260508-auth-clean1">
</head>
<body class="min-h-screen bg-slate-950">
  <main class="auth-cyber-page auth-choice-page" style="background-image: linear-gradient(120deg, rgba(2,12,23,0.82), rgba(0,40,60,0.44)), url('{% static "images/slider/slide-1-siber.jpg" %}');">
    <form method="post" class="auth-choice-card">
      {% csrf_token %}
      <a href="{% url 'website:home' %}" class="auth-logo-link" aria-label="Ana sayfaya dön">
        <img src="{% static 'images/konumsal-logo-white.png' %}" alt="Konumsal Bilgi Sistemleri" class="auth-panel-logo">
      </a>

      <h1 class="mt-8 text-center text-3xl font-bold text-white">Yönetim Girişi</h1>
      <p class="mt-3 text-center text-sm leading-6 text-white/75">Bu alan yalnızca yönetici hesabı için ayrılmıştır.</p>

      {% if error %}
        <div class="mt-6 rounded-2xl border border-rose-300/50 bg-rose-500/15 px-4 py-3 text-sm font-semibold text-rose-100">
          {{ error }}
        </div>
      {% endif %}

      <div class="mt-7 space-y-4">
        <div>
          <label for="admin-username" class="sr-only">Kullanıcı adı</label>
          <input id="admin-username" type="text" name="username" placeholder="Yönetici kullanıcı adı" class="auth-choice-input" required autofocus autocomplete="username">
        </div>
        <div>
          <label for="admin-password" class="sr-only">Şifre</label>
          <input id="admin-password" type="password" name="password" placeholder="Şifre" class="auth-choice-input" required autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="auth-choice-submit">Yönetim Paneline Gir</button>
    </form>
  </main>
</body>
</html>
